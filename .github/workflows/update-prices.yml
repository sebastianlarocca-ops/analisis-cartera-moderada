name: Actualizar precios de mercado

on:
  schedule:
    # Cada 30 min entre 13:00 y 20:00 UTC (10:00-17:00 ART), lunes a viernes
    - cron: '0,30 13-20 * * 1-5'
  workflow_dispatch: # Permite ejecutar manualmente desde GitHub

jobs:
  fetch-prices:
    name: Fetch y push precios
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install yfinance requests

      - name: Ejecutar fetch-prices
        env:
          RAILWAY_URL: ${{ secrets.RAILWAY_URL }}
          PRICES_PUSH_SECRET: ${{ secrets.PRICES_PUSH_SECRET }}
        run: python scripts/fetch-prices.py
